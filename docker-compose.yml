name: onboarding-task

services:
  postgres:
    image: postgres:18-alpine
    container_name: onboarding_task_pg
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.6-alpine
    container_name: onboarding_task_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: